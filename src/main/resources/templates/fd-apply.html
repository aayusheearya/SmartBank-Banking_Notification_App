<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Fixed Deposit — SmartBank</title>
	<style>
		:root {
			--bg-solid: #0b0d17;
			--card-bg: #161b2c;
			--accent: #10b981;
			--accent-alt: #6366f1;
			--text-bright: #ffffff;
			--text-dim: #94a3b8;
			--border: #2d3748;
		}
		body {
			margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-solid);
			height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
		}

		/* ADDED: Error Toast Popup */
		.error-toast {
			position: fixed;
			top: 25px;
			left: 50%;
			transform: translateX(-50%) translateY(-100px); /* Hidden above screen */
			background: #ef4444; /* Red for error */
			color: #ffffff;
			padding: 12px 24px;
			border-radius: 50px;
			font-weight: 700;
			box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
			transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			z-index: 1000;
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.error-toast.show {
			transform: translateX(-50%) translateY(0); /* Drops down into view */
		}

		.main-card {
			background: var(--card-bg); width: 90%; max-width: 1000px;
			border-radius: 16px; border: 1px solid var(--border);
			box-shadow: 0 25px 50px rgba(0,0,0,0.6); padding: 30px 40px;
		}
		.header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
		.logo {
			width: 38px; height: 38px; border-radius: 10px;
			background: linear-gradient(135deg, var(--accent-alt), var(--accent));
			display: flex; align-items: center; justify-content: center;
			font-weight: 900; color: #0b0d17; font-size: 16px;
		}
		h2 { color: #fff; margin: 0; font-size: 24px; font-weight: 800; }
		.form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px 20px; margin: 20px 0; }
		.span-2 { grid-column: span 2; }
		label { font-size: 11px; color: var(--accent); font-weight: 700; display: block; margin-bottom: 6px; text-transform: uppercase; }
		input, select {
			width: 100%; padding: 10px; background: var(--bg-solid);
			border: 1px solid var(--border); border-radius: 8px;
			color: #fff; font-size: 14px; box-sizing: border-box;
		}
		input[readonly] { border-color: var(--accent-alt); color: var(--accent); font-weight: 800; }
		.section-label { grid-column: span 4; font-size: 11px; color: var(--accent-alt); font-weight: 800; margin-top: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; }
		.btn { padding: 12px 30px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: 0.2s; }
		.btn-primary { background: linear-gradient(135deg, var(--accent-alt), var(--accent)); color: #fff; }
		.btn-ghost { color: var(--text-dim); text-decoration: none; font-size: 14px; }
	</style>
</head>
<body>

<div id="toast" class="error-toast" th:classappend="${param.error != null} ? 'show' : ''">
	<span>⚠️</span> <span th:text="${param.error}">Error!</span>
</div>

<div class="main-card">
	<div class="header">
		<div class="logo">SB</div>
		<h2>Create Fixed Deposit</h2>
	</div>

	<form th:action="@{/fixed-deposit/apply}" th:object="${fdForm}" method="post">
		<div class="form-grid">
			<div class="section-label">Investment Details</div>
			<div class="span-2"><label>Principal Amount (INR)*</label><input type="number" th:field="*{amount}" required placeholder="Min ₹10,000"/></div>
			<div><label>Term (Months)*</label><input type="number" th:field="*{termMonths}" required placeholder="e.g. 12"/></div>
			<div><label>Interest Rate %</label><input th:field="*{interestRate}" id="r" readonly /></div>

			<div class="section-label">Maturity Instructions</div>
			<div class="span-2">
				<label>Interest Payout Type*</label>
				<select name="payoutType" required>
					<option value="cumulative">Cumulative (At Maturity)</option>
					<option value="monthly">Monthly Payout</option>
					<option value="quarterly">Quarterly Payout</option>
				</select>
			</div>
			<div class="span-2">
				<label>On Maturity Action*</label>
				<select name="maturityAction" required>
					<option value="renew">Auto-Renew Principal & Interest</option>
					<option value="credit">Credit to Account</option>
				</select>
			</div>

			<div class="section-label">Nominee & Source</div>
			<div class="span-2"><label>Nominee Name*</label><input type="text" name="nomineeName" required placeholder="Full Name"/></div>
			<div><label>Nominee Relation*</label><input type="text" name="nomineeRelation" required placeholder="e.g. Spouse"/></div>
			<div>
				<label>Debit Account*</label>
				<select name="debitAccount" required><option value="savings">Savings-XXXX1234</option><option value="current">Current-XXXX5678</option></select>
			</div>
		</div>

		<div style="display: flex; justify-content: flex-end; gap: 20px; align-items: center;">
			<a th:href="@{/dashboard}" class="btn-ghost">Back to Dashboard</a>
			<button type="submit" class="btn btn-primary">Open Fixed Deposit</button>
		</div>
	</form>
</div>

<script>
	const a = document.querySelector('[name="amount"]'), t = document.querySelector('[name="termMonths"]'), r = document.getElementById('r');
	function calc() {
		const vA = parseFloat(a.value), vT = parseInt(t.value);
		if (vA && vT) { let rate = vT <= 12 ? 6.25 : 7.50; r.value = rate.toFixed(2); }
	}
	a.addEventListener('input', calc); t.addEventListener('input', calc);
</script>

<script>
	window.addEventListener('load', () => {
		const toast = document.getElementById('toast');
		if (toast && toast.classList.contains('show')) {
			setTimeout(() => {
				toast.classList.remove('show');
				// Clean the URL so the error doesn't reappear on refresh
				const url = new URL(window.location);
				url.searchParams.delete('error');
				window.history.replaceState({}, '', url);
			}, 4000);
		}
	});
</script>

</body>
</html>
