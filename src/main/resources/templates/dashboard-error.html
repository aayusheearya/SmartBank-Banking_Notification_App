<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="utf-8" />

	<title>Dashboard Error</title>

	<style>
		body {

			background: #07121a;

			color: #e9fbff;

			font-family: Arial, sans-serif;

			padding: 40px;

			text-align: center;

		}

		a {

			color: #4fd8ff;

			text-decoration: none;

			font-weight: bold;

		}

		.box {

			background: rgba(255, 255, 255, 0.05);

			display: inline-block;

			padding: 20px 30px;

			border-radius: 10px;

			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);

		}
	</style>

</head>

<body>

	<div class="box">

		<h2>⚠️ Oops, something went wrong</h2>

		<p th:text="${errorMessage}">Unable to load dashboard right now.</p>

		<p><a th:href="@{/}">⬅ Back to Home</a></p>

	</div>

</body>

</html>
