<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Admin — Users</title>
	<link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
	<style>
		:root {
			--bg-solid: #0b0d17;
			--card-bg: #161b2c;
			--accent: #10b981;
			--accent-alt: #6366f1;
			--text-bright: #ffffff;
			--text-dim: #94a3b8;
			--border: #2d3748;
		}

		html, body { height: 100%; margin: 0; }
		body {
			font-family: 'Inter', sans-serif;
			background: radial-gradient(circle at top right, #111827, var(--bg-solid));
			color: var(--text-bright);
			display: flex;
			flex-direction: column;
			font-size: 14px;
		}

		.wrap {
			flex: 1 0 auto;
			max-width: 1100px;
			width: 90%;
			margin: 35px auto;
		}

		/* Back button with hover lift */
		.btn-back {
			display: inline-flex;
			align-items: center;
			padding: 8px 14px;
			border-radius: 7px;
			text-decoration: none;
			background: transparent;
			border: 1px solid var(--border);
			color: var(--accent);
			font-weight: 700;
			font-size: 13px;
			margin-bottom: 20px;
			transition: all 0.2s ease;
		}

		.btn-back:hover {
			background: rgba(16, 185, 129, 0.05);
			border-color: var(--accent);
			transform: translateY(-2px);
		}

		h1 {
			font-size: 22px;
			font-weight: 800;
			margin: 0 0 20px 0;
			letter-spacing: -0.5px;
		}

		/* Search Row styling */
		.search-row {
			display: flex;
			gap: 10px;
			align-items: center;
			margin-bottom: 20px;
			background: var(--card-bg);
			padding: 12px;
			border-radius: 10px;
			border: 1px solid var(--border);
		}

		.search-row input[type="search"] {
			flex: 1;
			padding: 10px 14px;
			border-radius: 8px;
			border: 1px solid var(--border);
			background: var(--bg-solid);
			color: var(--text-bright);
			font-size: 13px;
			outline: none;
			transition: border-color 0.2s;
		}

		.search-row input[type="search"]:focus {
			border-color: var(--accent);
		}

		.search-row button {
			padding: 10px 16px;
			border-radius: 8px;
			border: none;
			background: var(--border);
			color: var(--text-bright);
			cursor: pointer;
			font-weight: 700;
			font-size: 12px;
			transition: all 0.2s;
		}

		#sortByName {
			background: linear-gradient(135deg, var(--accent-alt), var(--accent));
			color: #fff;
		}

		.search-row button:hover {
			opacity: 0.9;
			transform: translateY(-1px);
		}

		/* Table Styling */
		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 10px;
		}

		th {
			padding: 12px;
			text-align: left;
			color: var(--text-dim);
			font-size: 11px;
			text-transform: uppercase;
			letter-spacing: 1px;
			border-bottom: 2px solid var(--border);
			background: rgba(255, 255, 255, 0.02);
		}

		td {
			padding: 14px 12px;
			font-size: 13px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.04);
		}

		tbody tr {
			transition: all 0.2s ease;
		}

		tbody tr:hover {
			background: rgba(16, 185, 129, 0.03);
			transform: translateY(-2px);
		}

		.small-muted { color: var(--text-dim); font-size: 13px; }

		.no-match {
			text-align: center;
			color: #fca5a5;
			padding: 30px;
			display: none;
			font-size: 14px;
			font-weight: 600;
		}

		footer {
			flex-shrink: 0;
			padding: 20px;
			text-align: center;
			color: var(--text-dim);
			font-size: 12px;
			border-top: 1px solid var(--border);
			background: var(--bg-solid);
		}
	</style>
</head>

<body>

<div class="wrap">
	<a th:href="@{/admin}" class="btn-back">← Back to Dashboard</a>

	<h1>Registered Users</h1>

	<div class="search-row" role="search">
		<input id="userSearch" type="search" placeholder="Search by email (e.g. user@example.com)">
		<button id="clearSearch" type="button">Clear</button>
		<button id="sortByName" type="button">Sort by Name</button>
	</div>

	<table id="usersTable">
		<thead>
		<tr>
			<th>Full name</th>
			<th>Email</th>
			<th>Phone</th>
			<th>Created</th>
		</tr>
		</thead>
		<tbody>
		<tr th:if="${users == null or #lists.isEmpty(users)}">
			<td colspan="4" class="small-muted" style="text-align:center;">No users found.</td>
		</tr>
		<tr th:each="u : ${users}">
			<td class="user-name" th:text="${u.fullName}" style="font-weight:700">John Doe</td>
			<td class="user-email" th:text="${u.email}" style="color:var(--accent)">john@example.com</td>
			<td th:text="${u.phone}">+911234567890</td>
			<td class="small-muted" th:text="${#temporals.format(u.createdAt,'yyyy-MM-dd')}">2025-01-01</td>
		</tr>
		</tbody>
	</table>

	<div id="noMatchNotice" class="no-match">No users match your search criteria.</div>
</div>

<footer>
	© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> SmartBank — Admin console
</footer>

<script>
	(function () {
		const input = document.getElementById('userSearch');
		const clearBtn = document.getElementById('clearSearch');
		const sortBtn = document.getElementById('sortByName');
		const table = document.getElementById('usersTable');
		const tbody = table.querySelector('tbody');
		const rows = Array.from(tbody.querySelectorAll('tr'));
		const noMatchNotice = document.getElementById('noMatchNotice');

		function rowEmail(row) {
			const emailCell = row.querySelector('.user-email');
			return emailCell ? emailCell.textContent.trim().toLowerCase() : '';
		}

		function filterRows() {
			const q = (input.value || '').trim().toLowerCase();
			let anyVisible = false;

			rows.forEach(row => {
				const email = rowEmail(row);
				if (!email && row.querySelector('.small-muted')) { // Handle "No users" row
					row.style.display = rows.filter(r => r.querySelector('.user-email')).length === 0 ? '' : 'none';
					return;
				}

				if (!q) {
					row.style.display = '';
					anyVisible = true;
				} else {
					if (email.indexOf(q) !== -1) {
						row.style.display = '';
						anyVisible = true;
					} else {
						row.style.display = 'none';
					}
				}
			});

			noMatchNotice.style.display = (q && !anyVisible) ? 'block' : 'none';
		}

		input.addEventListener('input', filterRows);
		clearBtn.addEventListener('click', function () {
			input.value = '';
			input.focus();
			filterRows();
		});

		sortBtn.addEventListener('click', function () {
			const userRows = rows.filter(r => r.querySelector('.user-name'));
			userRows.sort((a, b) => {
				const nameA = a.querySelector('.user-name').textContent.trim().toLowerCase();
				const nameB = b.querySelector('.user-name').textContent.trim().toLowerCase();
				return nameA.localeCompare(nameB);
			});
			userRows.forEach(r => tbody.appendChild(r));
		});

		filterRows();
	})();
</script>
</body>
</html>
