<!doctype html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="utf-8" />

	<meta name="viewport" content="width=device-width,initial-scale=1" />

	<title>Create Loan — Admin — SmartBank</title>

	<link rel="stylesheet" href="/css/style.css" />

	<style>
		.wrap {
			max-width: 800px;
			margin: 30px auto;
			padding: 18px;
		}

		.card {
			background: var(--panel);
			padding: 18px;
			border-radius: 10px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
		}

		.form-row {
			display: flex;
			gap: 12px;
			margin-bottom: 12px;
		}

		label {
			display: block;
			color: var(--muted);
			margin-bottom: 6px;
		}

		input[type="text"],
		input[type="number"],
		input[type="date"] {
			width: 100%;
			padding: 10px;
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.06);
			background: #071a22;
			color: #e9fbff;
		}

		.btn {
			padding: 10px 14px;
			border-radius: 10px;
			font-weight: 700;
		}

		.success {
			background: linear-gradient(90deg, #e6fff5, #d6fff0);
			color: #023;
			padding: 10px;
			border-radius: 8px;
			margin-bottom: 12px;
		}

		.error {
			background: #3a1f1f;
			color: #ffbebe;
			padding: 10px;
			border-radius: 8px;
			margin-bottom: 12px;
		}
	</style>

</head>

<body>

	<div class="wrap">

		<div class="card">

			<h2>Create Loan for User</h2>


			<div th:if="${error}" class="error" th:text="${error}"></div>

			<div th:if="${success}" class="success" th:text="${success}"></div>


			<form th:action="@{/admin/loans/create}" method="post">

				<div class="form-row">

					<div style="flex:1">

						<label for="email">User Email</label>

						<input id="email" name="email" type="text" th:value="${email}" placeholder="user@example.com"
							required />

					</div>

					<div style="width:180px">

						<label for="principal">Principal</label>

						<input id="principal" name="principal" type="number" step="0.01" th:value="${principal}"
							placeholder="10000.00" required />

					</div>

				</div>


				<div class="form-row">

					<div style="flex:1">

						<label for="monthlyInstallment">Monthly Installment (optional)</label>

						<input id="monthlyInstallment" name="monthlyInstallment" type="number" step="0.01"
							th:value="${monthlyInstallment}" placeholder="833.33" />

					</div>

					<div style="width:220px">

						<label for="nextDueDate">Next Due Date (optional)</label>

						<input id="nextDueDate" name="nextDueDate" type="date" th:value="${nextDueDate}" />

					</div>

				</div>


				<div class="form-row">

					<div style="flex:1">

						<label for="reference">Reference / Note</label>

						<input id="reference" name="reference" type="text" th:value="${reference}"
							placeholder="Loan ref / note" />

					</div>

				</div>


				<div style="margin-top:8px;">

					<button class="btn btn-primary" type="submit">Create Loan</button>

					<!-- changed: Back to Home -->

					<a th:href="@{ / }" class="btn btn-ghost" style="margin-left:10px;">Back to Home</a>

				</div>

			</form>

		</div>

	</div>

</body>

</html>
