<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Application submitted — SmartBank</title>
	<link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
	<style>
		:root {
			--bg-solid: #0b0d17;
			--card-bg: #161b2c;
			--accent: #10b981;
			--accent-alt: #6366f1;
			--text-bright: #ffffff;
			--text-dim: #94a3b8;
			--border: #2d3748;
		}

		/* Layout basics */
		html, body { height: 100%; margin: 0; }
		body {
			font-family: 'Inter', sans-serif;
			background: radial-gradient(circle at top right, #111827, var(--bg-solid));
			color: var(--text-bright);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			font-size: 14px;
		}

		.wrap {
			max-width: 500px;
			width: 90%;
			text-align: center;
		}

		/* Icon styling to fill empty space */
		.success-icon {
			width: 60px;
			height: 60px;
			background: rgba(16, 185, 129, 0.1);
			color: var(--accent);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 30px;
			margin: 0 auto 20px auto;
			border: 1px solid rgba(16, 185, 129, 0.2);
		}

		.card {
			background: var(--card-bg);
			padding: 40px 30px;
			border-radius: 16px;
			border: 1px solid var(--border);
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
		}

		.title {
			font-size: 22px;
			font-weight: 800;
			color: var(--text-bright);
			letter-spacing: -0.5px;
			margin-bottom: 10px;
		}

		.muted {
			color: var(--text-dim);
			line-height: 1.6;
			margin-bottom: 25px;
		}

		/* Button with hover lift */
		.btn {
			padding: 12px 24px;
			border-radius: 8px;
			border: 0;
			cursor: pointer;
			font-weight: 700;
			text-decoration: none;
			display: inline-block;
			font-size: 14px;
			transition: all 0.2s ease;
		}

		.btn-primary {
			background: linear-gradient(135deg, var(--accent-alt), var(--accent));
			color: #fff;
			box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
		}

		.btn-primary:hover {
			transform: translateY(-3px);
			box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
			opacity: 0.95;
		}

		footer {
			position: absolute;
			bottom: 0;
			width: 100%;
			padding: 20px;
			text-align: center;
			color: var(--text-dim);
			font-size: 12px;
			border-top: 1px solid var(--border);
			background: var(--bg-solid);
		}
	</style>
</head>
<body>

<div class="wrap">
	<div class="card">
		<div class="success-icon">✓</div>

		<div class="title" th:text="${messageTitle}">Application submitted</div>

		<div class="muted" th:text="${messageBody}">Your application has been received and is currently being processed by our team.</div>

		<div>
			<a th:href="${backLink}" class="btn btn-primary">Back to Dashboard</a>
		</div>
	</div>
</div>

<footer>
	© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> SmartBank — Secure Banking Portal
</footer>

</body>
</html>
