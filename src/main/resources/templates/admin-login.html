<!doctype html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="utf-8" />

	<meta name="viewport" content="width=device-width,initial-scale=1" />

	<title>Admin Login — SmartBank</title>

	<link rel="stylesheet" href="/css/style.css" />

	<style>
		body {
			margin: 0;
			font-family: Inter, Segoe UI, Roboto, Arial;
			background: linear-gradient(180deg, #0b1e27, #06121a);
			color: #e9fbff;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh
		}

		.login-card {
			background: #0f1b23;
			padding: 40px 32px;
			border-radius: 14px;
			box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
			width: 100%;
			max-width: 420px
		}

		h2 {
			margin: 0 0 20px 0;
			font-size: 24px;
			font-weight: 700;
			text-align: center;
			color: #e6faff
		}

		label {
			display: block;
			margin-bottom: 6px;
			font-size: 14px;
			color: #9aa9b3
		}

		input {
			width: 100%;
			padding: 12px;
			margin-bottom: 16px;
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.06);
			background: #071a22;
			color: #e9fbff;
			font-size: 15px
		}

		.btn {
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 10px;
			font-weight: 700;
			font-size: 15px;
			cursor: pointer;
			background: linear-gradient(90deg, #4fd8ff, #2aa6d9);
			color: #02202a
		}

		.back-home {
			display: block;
			margin-top: 12px;
			text-align: center;
			font-size: 14px;
			color: #7baac0;
			text-decoration: none
		}

		.back-home:hover {
			color: #4fd8ff
		}
	</style>

</head>

<body>

	<div class="login-card">

		<h2>Admin Sign In</h2>


		<!-- Spring Security will add ?error when login fails; keep message but minimal -->

		<div th:if="${param.error != null}"
			style="background:#3a1f1f;color:#ffbebe;padding:10px;border-radius:8px;margin-bottom:12px;text-align:center;">

			Invalid username or password.

		</div>


		<form th:action="@{/admin/perform_login}" method="post">

			<label for="username">Username</label>

			<input id="username" name="username" type="text" placeholder="Enter admin username" required />


			<label for="password">Password</label>

			<input id="password" name="password" type="password" placeholder="Enter password" required />


			<button type="submit" class="btn">Sign In</button>

		</form>


		<a class="back-home" th:href="@{/}">← Back to Home</a>

	</div>

</body>

</html>
